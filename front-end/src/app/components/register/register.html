<div class="register-wrapper">
  <mat-card appearance="outlined">

    <mat-card-header>
      <mat-card-title>Criar uma conta</mat-card-title>
    </mat-card-header>

    <mat-card-content>
      <form [formGroup]="registerForm" (ngSubmit)="onSubmit()">

        <mat-form-field appearance="outline">
          <mat-label>Nome</mat-label>
          <input matInput type="text" formControlName="name" placeholder="Seu nome completo" />
        </mat-form-field>

        <mat-form-field appearance="outline">
          <mat-label>E-mail</mat-label>
          <input matInput type="email" formControlName="email" placeholder="seu@email.com" />
        </mat-form-field>

        <mat-form-field appearance="outline">
          <mat-label>Senha</mat-label>
          <input matInput type="password" formControlName="password" placeholder="••••••••" />
        </mat-form-field>

      </form>
    </mat-card-content>

    <mat-card-actions>
      <button mat-stroked-button (click)="onSubmit()" [disabled]="registerForm.invalid">
        Cadastrar
      </button>
    </mat-card-actions>

  </mat-card>
</div>
