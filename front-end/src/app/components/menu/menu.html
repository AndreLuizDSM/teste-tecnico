<mat-toolbar>

  <a routerLink="/">
    Teste-técnico
  </a>

  <span class="spacer"></span>

  @if (!isLoggedIn) {
    <button mat-button routerLink="/login">Entrar</button>
    <button mat-button routerLink="/register">Cadastrar</button>

}

  @if (isLoggedIn) {
    <span>{{ userEmail }}</span>
    <button mat-stroked-button (click)="logout()">
      <mat-icon>logout</mat-icon>
      Sair
    </button>
  }

</mat-toolbar>
